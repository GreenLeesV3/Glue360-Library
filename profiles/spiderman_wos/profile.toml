[build]
# No runtime patches needed � the prebuilt SDK works as-is.
requires_sdk_source = false

[[sources]]
from = "src/main.cpp"
to   = "src/main.cpp"
optional = false

[[sources]]
from = "src/spiderman_wos_app.h"
to   = "src/spiderman_wos_app.h"
optional = false

[[sources]]
from = "src/roundevenf.cpp"
to   = "src/roundevenf.cpp"
optional = false

# --- Cvars: rendered into spiderman_wos_app.h::OnPreSetup ---
# RTV render path with execute_unclipped_draw_vs_on_cpu fix (prevents black screen)
# Based on Skate3Recomp config patterns � same AMD APU validated.
[cvars]
# No render_target_path_d3d12 override � SDK defaults to RTV on AMD
# GPU optimizations
gpu_allow_invalid_fetch_constants = "true"
async_shader_compilation = "true"
# Skate3-style cvars (critical for RTV black screen fix)
protect_zero = "false"
clear_memory_page_state = "false"
execute_unclipped_draw_vs_on_cpu = "true"
occlusion_query_enable = "true"
# Present optimizations
d3d12_allow_variable_refresh_rate_and_tearing = "true"
host_present_from_non_ui_thread = "true"
# 60 FPS unlock
video_mode_refresh_rate = "120.0"
vsync = "false"
# Shader cache
store_shaders = "true"

[build_options]
static_msvc_runtime = false
enable_lto = true
cpu_target = ""

# --- Deploy configuration ---
[deploy]
toml_template = "spiderman_wos.toml.template"
copy_dlls = ["rexruntime.dll"]
create_game_junction = true
create_user_data = true

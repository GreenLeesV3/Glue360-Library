[build]
# Captain America stores DIR.BIN and DATA.* as XCTD-compressed archives. The
# standard 0.8.0 runtime cannot classify them, so this profile builds the SDK
# with the upstream magic-header query fix.
requires_sdk_source = true

[[runtime_patches]]
id = "xctd-compression-query"
target = "src/kernel/xboxkrnl/xboxkrnl_io_info.cpp"
category = "game-runtime"
required = true

[[sources]]
from = "src/main.cpp"
to = "src/main.cpp"
optional = false

[[sources]]
from = "src/captain_america_app.h"
to = "src/captain_america_app.h"
optional = false

[[sources]]
from = "src/roundevenf.cpp"
to = "src/roundevenf.cpp"
optional = false

[cvars]
# Keep the baseline conservative until runtime evidence justifies game-specific
# rendering or timing overrides.
gpu_allow_invalid_fetch_constants = "true"
async_shader_compilation = "true"
store_shaders = "true"

[build_options]
static_msvc_runtime = false
enable_lto = true
cpu_target = ""

[deploy]
toml_template = "captain_america.toml.template"
copy_dlls = ["rexruntime.dll"]
create_game_junction = true
create_user_data = true

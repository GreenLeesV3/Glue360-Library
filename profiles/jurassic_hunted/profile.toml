# --- Switch table overrides (injected into manifest) ---
# Misdetected jump table at Lua EvalFunction dispatch (index byte [r3+24],
# 8-byte {func, name} records at 0x827264D8). Auto-detection produced a
# 1-case switch on the wrong register that trapped at runtime.
[[switch_tables]]
address = "0x8236F3EC"
register = 11
labels = ["0x8236F3F0", "0x8236F450", "0x8236F410", "0x8236F430"]

[build]
# No runtime patches needed — the prebuilt SDK works as-is.
requires_sdk_source = false

[build_options]
# Static CRT — disabled: requires building the SDK from source for /MT
# consistency. The prebuilt SDK uses /MD, so mixing causes LNK2038.
# Enable only if requires_sdk_source is also true.
static_msvc_runtime = false
# LTO for Release builds only (smaller exe, better optimization)
enable_lto = true
# CPU target — "" = x86-64 baseline (works on all x64 CPUs)
cpu_target = ""

# --- Source files copied into the generated project's src/ after codegen ---
[[sources]]
from = "src/main.cpp"
to   = "src/main.cpp"
optional = false

[[sources]]
from = "src/jurassic_hunted_app.h"
to   = "src/jurassic_hunted_app.h"
optional = false

[[sources]]
from = "src/roundevenf.cpp"
to   = "src/roundevenf.cpp"
optional = false

# --- Cvars: rendered into jurassic_hunted_app.h::OnPreSetup via the template ---
# Only safe cvars that don't interfere with the CloakNT engine's gamma pipeline.
# Do NOT set gamma_render_target_as_unorm16, snorm16_render_target_full_range,
# mrt_edram_used_range_clamp_to_min, readback_resolve, anisotropic_override, or
# swap_post_effect — the SDK defaults produce correct rendering. Overriding
# them caused dark/shadowy gameplay.
[cvars]
# Render path — RTV (SDK default on AMD, supports gamma pipeline)
render_target_path_d3d12 = "rtv"
# Texture cache — defaults too low for 3.16GB game data
texture_cache_memory_limit_hard = "4096"
texture_cache_memory_limit_soft = "2048"
texture_cache_memory_limit_soft_lifetime = "120"
texture_cache_memory_limit_render_to_texture = "256"
# Performance
d3d12_submit_on_primary_buffer_end = "false"
# Shader cache persistence
store_shaders = "true"

# --- Deploy configuration ---
[deploy]
# Runtime TOML template (relative to profile_dir)
toml_template = "jurassic_hunted.toml.template"
# DLLs copied alongside the exe into the portable folder.
# No TracyClient.dll — Jurassic builds with Tracy OFF.
copy_dlls = ["rexruntime.dll"]
# Create a `game/` junction to the extracted assets in the deploy folder
create_game_junction = true
# Seed a `user_data/` dir for saves + shader cache
create_user_data = true

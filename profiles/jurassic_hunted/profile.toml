# Jurassic: The Hunted (Xbox 360) — Game Profile
#
# Declarative description of everything game-specific the recompiler needs to
# produce a playable native Windows port of Jurassic: The Hunted. Consumed by
# recomp::profile::load_profile() (src/profile/game_profile.cpp).

# --- Setjmp/Longjmp addresses (top-level keys, NOT inside any [section]) ---
# The profile loader reads these via root.get("setjmp_address") — they MUST be
# before the first [section] header. Injected into the manifest's [entrypoint]
# table by rexglue_init (code path: ManifestConfig::Load -> LoadBinaryConfig
# passes [entrypoint] subtable -> ApplyToml reads toml["setjmp_address"]).
# Xenon CRT _setjmp begins with a patchable-hook check that falls through into
# the register-save body; the function scanner truncates it at the conditional
# bnectr, so the recompiled version returns garbage. Without these, Lua 5.1's
# luaD_rawrunprotected silently skips f_luaopen and the GC crashes.
setjmp_address = "0x8261C960"
longjmp_address = "0x8261C520"

[profile]
id = "jurassic_hunted"
name = "Jurassic: The Hunted (Xbox 360)"
title_id = "41560870"          # Xbox 360 retail title ID
sdk_version = "0.8.0"          # RexGlue360 SDK version this profile targets
xex_entrypoint = "default.xex"
project_name = "jurassic_hunted"
# --- Function hints (injected into manifest via includes mechanism) ---
